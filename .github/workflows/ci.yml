name: Phoenix Test Automation Framework (Rest Assured)
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        type: choice
        options: [qa, uat, dev]
        default: qa
        required: true
      suiteXmlFile:
        description: "TestNg XML file"
        type: choice
        options: [testng.xml, smoke.xml]
        default: testng.xml
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Execute Test Automation Framework
        run: mvn clean test -DsuiteXmlFile=${{ github.event.inputs.suiteXmlFile || 'testng.xml' }} -Denv=${{ github.event.inputs.env || 'qa' }}

      - name: Upload a Build Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SureFire Report
          path: target/surefire-reports/
          retention-days: 10
